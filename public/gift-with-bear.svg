<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1600" height="10" fill="url(#accent)" opacity="0.9"/>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="1380" height="660" rx="28" fill="#0b1220" stroke="#1f2937" stroke-width="2"/>
  </g>

  <!-- Left: text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="190" y="220" fill="#9ca3af" font-size="18" letter-spacing="3">CASE STUDY</text>
    <text x="190" y="290" fill="#ffffff" font-size="64" font-weight="700">Gift With Bear</text>
    <text x="190" y="340" fill="#a7f3d0" font-size="22" font-weight="600">Founding Engineer / CTO</text>

    <text x="190" y="410" fill="#d1d5db" font-size="22">
      <tspan x="190" dy="0">Web + backend platform with payments, fulfillment, recommendations,</tspan>
      <tspan x="190" dy="34">and ChatGPT App integration.</tspan>
    </text>

    <!-- “Stack pills” -->
    <g font-size="18" font-weight="600">
      <g>
        <rect x="190" y="470" width="190" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="225" y="499" fill="#e5e7eb">Firebase</text>
      </g>
      <g>
        <rect x="395" y="470" width="160" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="430" y="499" fill="#e5e7eb">Stripe</text>
      </g>
      <g>
        <rect x="570" y="470" width="170" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="605" y="499" fill="#e5e7eb">Goody</text>
      </g>
      <g>
        <rect x="755" y="470" width="230" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="790" y="499" fill="#e5e7eb">Cloud Run API</text>
      </g>
      <g>
        <rect x="190" y="528" width="250" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="225" y="557" fill="#e5e7eb">MCP / ChatGPT App</text>
      </g>
      <g>
        <rect x="455" y="528" width="160" height="44" rx="22" fill="#0f172a" stroke="#1f2937"/>
        <text x="490" y="557" fill="#e5e7eb">Finch</text>
      </g>
    </g>

    <text x="190" y="650" fill="#6b7280" font-size="16">
      Swap this placeholder SVG for a real screenshot anytime (keep the same filename).
    </text>
  </g>

  <!-- Right: device mock -->
  <g>
    <rect x="1030" y="210" width="360" height="520" rx="54" fill="#0a0f1a" stroke="#1f2937" stroke-width="2"/>
    <rect x="1060" y="250" width="300" height="440" rx="34" fill="#0b1220" stroke="#111827"/>
    <circle cx="1210" cy="232" r="6" fill="#374151"/>

    <!-- Screen accents -->
    <rect x="1085" y="280" width="250" height="16" rx="8" fill="url(#accent)" opacity="0.85"/>
    <rect x="1085" y="315" width="190" height="14" rx="7" fill="#1f2937"/>
    <rect x="1085" y="345" width="230" height="14" rx="7" fill="#1f2937"/>
    <rect x="1085" y="375" width="160" height="14" rx="7" fill="#1f2937"/>

    <rect x="1085" y="430" width="250" height="90" rx="18" fill="#0f172a" stroke="#1f2937"/>
    <rect x="1105" y="455" width="160" height="12" rx="6" fill="#1f2937"/>
    <rect x="1105" y="480" width="210" height="12" rx="6" fill="#1f2937"/>

    <rect x="1085" y="540" width="250" height="150" rx="22" fill="#0f172a" stroke="#1f2937"/>
    <rect x="1105" y="565" width="200" height="12" rx="6" fill="#1f2937"/>
    <rect x="1105" y="590" width="220" height="12" rx="6" fill="#1f2937"/>
    <rect x="1105" y="615" width="150" height="12" rx="6" fill="#1f2937"/>
  </g>
</svg>
